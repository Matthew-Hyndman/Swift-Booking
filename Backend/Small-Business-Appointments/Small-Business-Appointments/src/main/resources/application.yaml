spring:
  application:
    name: Small-Business-Appointments

  datasource:
    url: ${BOOKWISE_DB_URL:jdbc:postgresql://localhost:5432/small-business-appointments}
    username: ${BOOKWISE_DB_USERNAME:postgres}
    password: ${BOOKWISE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${BOOKWISE_ISSUER_URI:http://localhost:8080}
          jwk-set-uri: ${BOOKWISE_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}

  data:
    rest:
      base-path: /api
      detection-strategy: annotated    

  logging:
    level:
      org:
        springframework:
          security: DEBUG          

server:
  port: ${BOOKWISE_SERVER_PORT:8080}

allowed-origins:
  - http://localhost:5432
  - http://localhost:4200