<div class="app-shell">
  <header class="topbar glass-panel">
    <a routerLink="/" class="brand">BookWise</a>
    <nav aria-label="Primary navigation">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/about" routerLinkActive="is-active">About</a>
      <a routerLink="/subscriptions" routerLinkActive="is-active">Subscriptions</a>
      <a routerLink="/payment" routerLinkActive="is-active">Payment</a>
      <a routerLink="/bookings" routerLinkActive="is-active">View Bookings</a>
      <a routerLink="/bookings/new" routerLinkActive="is-active">Create A Booking</a>
      <a routerLink="/account" routerLinkActive="is-active">Account</a>
    </nav>
    <div class="auth-actions">
      @if (authService.isAuthenticated()) {
        <button type="button" class="ghost-button" (click)="logout()">Logout</button>
      } @else {
        <button type="button" class="ghost-button" (click)="login()">Login</button>
      }
    </div>
  </header>

  <main class="page-container">
    <router-outlet></router-outlet>
  </main>
</div>
