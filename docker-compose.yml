services:
    keycloak:
      image: quay.io/keycloak/keycloak:latest
      container_name: small-business-appointments-keycloak
      environment:
        KC_DB: postgres
        KC_DB_URL: "jdbc:postgresql://host.docker.internal:5432/Small-Business-Appointments-DB"
        KC_DB_USERNAME: Small-Business-Appointments-DB-Admin
        KC_DB_PASSWORD: Small-Business-Appointments-DB-Admin64!

        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        LANG: en_US.UTF-8
        KC_RUN_IN_CONTAINER: true
        KC_HEALTH_ENABLED: true
        KC_METRICS_ENABLED: true

        KC_BOOTSTRAP_ADMIN_USERNAME: admin
        KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # for debugging purposes only, remove in production
      #KC_LOG_LEVEL: DEBUG
      
      command: start-dev --http-port=8080
      ports:
      - "127.0.0.1:8080:8080"